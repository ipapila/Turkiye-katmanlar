name: Gunluk Cevre Veri Taramasi
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  tara:
    name: Veri Tara ve Guncelle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Repo kodunu al
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 kur
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Bagimliliklari yukle
        run: pip install -r tarama_sistemi/requirements.txt

      - name: Chrome kur
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Tarama calistir (GeoJSON dosyaları)
        working-directory: tarama_sistemi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DATA_PATH: data
        run: python main.py

      - name: Ekoloji Haritasi data.json guncelle
        working-directory: tarama_sistemi
        run: python veri_entegratoru.py --local

      - name: Log dosyalarini sakla
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tarama-loglari-${{ github.run_number }}
          path: tarama_sistemi/logs/
          retention-days: 14

      - name: Degisen dosyalari commit et
        uses: stefanzweifel/git-auto-commit-action@v5.0.1
        with:
          commit_message: "Otomatik guncelleme [skip ci]"
          file_pattern: "tarama_sistemi/data/*.geojson data.json"
          commit_user_name: "cevre-bot"
          commit_user_email: "bot@noreply.github.com"
          push_options: "--force"
