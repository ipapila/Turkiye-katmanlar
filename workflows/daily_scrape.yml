name: Gunluk Cevre Veri Taramasi

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scrapers:
        description: "Tarayicilar (bos=tumu; ornek: acele ced epdk sit)"
        required: false
        default: ""
      baslangic_tarihi:
        description: "Baslangic tarihi (YYYY-MM-DD, ornek: 2024-01-01)"
        required: false
        default: ""
      bitis_tarihi:
        description: "Bitis tarihi (YYYY-MM-DD, ornek: 2024-12-31)"
        required: false
        default: ""
      sadece_yeni:
        description: "Sadece son 7 gunun kayitlarini getir"
        type: boolean
        default: false
      dry_run:
        description: "Dry-run (push etme, sadece test)"
        type: boolean
        default: false

jobs:
  tara:
    name: Veri Tara ve Guncelle
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Repo kodunu al
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bagimliliklari yukle
        run: |
          pip install --upgrade pip
          pip install -r tarama_sistemi/requirements.txt

      - name: Chrome kur
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Geocode cache yukle
        uses: actions/cache@v4
        with:
          path: tarama_sistemi/data/geocode_cache.json
          key: geocode-cache-v1
          restore-keys: geocode-cache-

      - name: Mevcut tarayicilar
        working-directory: tarama_sistemi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DATA_PATH: data
        run: python main.py
        continue-on-error: true

      - name: Yeni tarayicilar
        working-directory: tarama_sistemi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DATA_PATH: data
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.scrapers }}" ]; then
            ARGS="$ARGS --scrapers ${{ github.event.inputs.scrapers }}"
          fi
          if [ -n "${{ github.event.inputs.baslangic_tarihi }}" ]; then
            ARGS="$ARGS --baslangic ${{ github.event.inputs.baslangic_tarihi }}"
          fi
          if [ -n "${{ github.event.inputs.bitis_tarihi }}" ]; then
            ARGS="$ARGS --bitis ${{ github.event.inputs.bitis_tarihi }}"
          fi
          if [ "${{ github.event.inputs.sadece_yeni }}" = "true" ]; then
            ARGS="$ARGS --sadece-yeni"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main_v2.py $ARGS
        continue-on-error: true

      - name: Log dosyalarini sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tarama-loglari-${{ github.run_number }}
          path: tarama_sistemi/logs/
          retention-days: 14

      - name: Degisen dosyalari commit et
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik guncelleme [skip ci]"
          file_pattern: "tarama_sistemi/data/*.geojson data/*.geojson tarama_sistemi/data/geocode_cache.json"
          commit_user_name: "cevre-bot"
          commit_user_email: "bot@noreply.github.com"
          push_options: "--force"
