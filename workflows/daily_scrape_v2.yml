name: Gunluk Cevre Veri Taramasi

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scrapers:
        description: "Tarayicilar (bos=tumu; ornek: acele ced epdk sit)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (push etme)"
        type: boolean
        default: false

jobs:
  tara:
    name: Veri Tara ve Guncelle
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Repo kodunu al
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bagimliliklari yukle
        run: |
          pip install --upgrade pip
          pip install -r tarama_sistemi/requirements.txt

      - name: Chrome kur
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Geocode cache yukle
        uses: actions/cache@v4
        with:
          path: tarama_sistemi/data/geocode_cache.json
          key: geocode-cache-v1
          restore-keys: geocode-cache-

      - name: Mevcut tarayicilar (jes milli_park ockkb ramsar maden)
        working-directory: tarama_sistemi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DATA_PATH: data
        run: |
          python main.py
        continue-on-error: true

      - name: Yeni tarayicilar (acele ced epdk ogm sit mapeg toki botas ekap vb)
        working-directory: tarama_sistemi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DATA_PATH: data
        run: |
          SCRAPER_ARG=""
          DRY_RUN_ARG=""

          if [ -n "${{ github.event.inputs.scrapers }}" ]; then
            SCRAPER_ARG="--scrapers ${{ github.event.inputs.scrapers }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python main_v2.py $SCRAPER_ARG $DRY_RUN_ARG
        continue-on-error: true

      - name: Log dosyalarini sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tarama-loglari-${{ github.run_number }}
          path: tarama_sistemi/logs/
          retention-days: 14

      - name: Degisen GeoJSON dosyalarini commit et
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik guncelleme [skip ci]"
          file_pattern: "tarama_sistemi/data/*.geojson data/*.geojson tarama_sistemi/data/geocode_cache.json"
          commit_user_name: "cevre-bot"
          commit_user_email: "bot@noreply.github.com"
          push_options: "--force"

  bildirim:
    name: Hata Bildirimi
    needs: tara
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Tarama basarisiz
        run: echo "::error::Gunluk tarama basarisiz. Log artifact kontrol edin."
