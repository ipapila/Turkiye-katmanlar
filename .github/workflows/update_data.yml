name: Update Map Data

on:
  workflow_dispatch: # Manuel olarak çalıştırmak için
  schedule:
    - cron: '0 4 * * *' # Her gün UTC 04:00'te çalışır (TSİ 07:00)

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run data update script
        run: python guncelle.py

      - name: Commit and push if there are changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json geocode_cache.json
          git diff --staged --quiet || (git commit -m "📊 Otomatik Veri Güncelleme: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
