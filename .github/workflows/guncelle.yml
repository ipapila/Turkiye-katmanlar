name: Günlük Veri Güncelleme

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: Veri güncelle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WDPA_TOKEN: ${{ secrets.WDPA_TOKEN }}
        run: python scripts/guncelle.py

      - name: Degisiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json geocode_cache.json
          git diff --staged --quiet || git commit -m "Otomatik veri guncellemesi $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

