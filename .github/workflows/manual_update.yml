name: Manual Data Update

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # Commit atabilmek için PAT kullanıyoruz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update data.json
        run: |
          import json
          import os
          
          # Gelen veriyi payload'dan al
          payload_str = os.environ.get('CLIENT_PAYLOAD')
          if not payload_str:
              print("Payload bulunamadı.")
              exit(1)
          
          payload = json.loads(payload_str)
          new_data_str = payload.get('data')
          if not new_data_str:
              print("Payload içinde 'data' anahtarı bulunamadı.")
              exit(1)

          new_data = json.loads(new_data_str)
          
          # Mevcut dosyayı yaz
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(new_data, f, ensure_ascii=False, indent=2)
              
          print(f"{len(new_data)} kayıt data.json dosyasına yazıldı.")
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # Sadece değişiklik varsa commit at
          if ! git diff --staged --quiet; then
            git commit -m "📝 Manuel veri güncellemesi"
            git push
          else
            echo "Değişiklik yok, commit atılmadı."
          fi
